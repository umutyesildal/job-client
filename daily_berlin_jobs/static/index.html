<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Berlin Jobs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=20260710-sync-flow-2">
  </head>
  <body>
    <main class="page">
      <nav class="navbar">
        <div class="brand">
          <div>
            <p class="brand-kicker">Daily Berlin Jobs</p>
            <div class="logo">Berlin job board</div>
          </div>
        </div>
        <div class="topbar-actions">
          <p id="updatedText" class="status-line">Loading jobs...</p>
          <button id="settingsToggle" class="settings-toggle" title="Settings" aria-label="Settings">Settings</button>
        </div>
      </nav>

      <section class="workspace-shell">
        <section class="mini-hero" aria-label="About this board">
          <p class="mini-hero-kicker">Daily Berlin engineering roles</p>
          <h1>Browse all Berlin jobs or focus only on what is new today.</h1>
        </section>

        <section class="controls-bar" aria-label="Job controls">
          <nav class="source-tabs" aria-label="Job source">
            <button class="source-tab active" data-source="all">All Jobs <span id="allTabCount">0</span></button>
            <button class="source-tab" data-source="daily">New Today <span id="dailyTabCount">0</span></button>
          </nav>

          <section class="filters" aria-label="Job filters">
            <label class="search-field">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Search by role, company, stack, location">
            </label>
            <div class="filter-row">
              <label class="filter-field">
                <span>Level</span>
                <select id="levelSelect">
                  <option value="all">Any level</option>
                  <option value="intern">Intern / Working Student</option>
                  <option value="junior">Junior / Entry</option>
                  <option value="senior">Senior</option>
                  <option value="staff_plus">Staff / Principal</option>
                  <option value="lead">Lead</option>
                  <option value="manager_plus">Manager / Head / Director</option>
                </select>
              </label>
              <label class="filter-field">
                <span>Role</span>
                <select id="roleSelect">
                  <option value="all">Any role</option>
                  <option value="backend">Backend</option>
                  <option value="frontend">Frontend</option>
                  <option value="fullstack">Fullstack</option>
                  <option value="data_ai">Data / AI / ML</option>
                  <option value="devops_platform">Platform / DevOps / SRE</option>
                  <option value="security">Security</option>
                  <option value="mobile">Mobile</option>
                  <option value="qa">QA / Test</option>
                </select>
              </label>
              <label class="filter-field">
                <span>Work Mode</span>
                <select id="remoteSelect">
                  <option value="all">Any mode</option>
                  <option value="remote_or_hybrid">Remote or Hybrid</option>
                  <option value="remote">Remote</option>
                  <option value="hybrid">Hybrid</option>
                  <option value="on_site">On-site</option>
                </select>
              </label>
            </div>
          </section>
        </section>

        <section class="jobs-list-container">
          <div class="table-header">
            <span class="col-title">Role</span>
            <span class="col-company">Company</span>
            <span class="col-tags">Tags</span>
            <span class="col-date">Date</span>
          </div>
          <div id="jobsList" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <div id="settingsBackdrop" class="settings-backdrop" hidden></div>
    <aside id="settingsPanel" class="settings-panel" aria-label="Settings" hidden>
      <div class="panel-heading">
        <h2>Settings</h2>
        <button id="settingsClose" class="icon-button" title="Close" aria-label="Close">×</button>
      </div>

      <div class="field-grid">
        <label class="field">
          <span>Per Query</span>
          <input id="limitInput" type="number" min="1" max="200" disabled value="25">
        </label>
        <label class="field">
          <span>Hours</span>
          <input id="hoursInput" type="number" min="0" max="168" disabled value="24">
        </label>
      </div>

      <label class="toggle">
        <input id="includeLinkedInInput" type="checkbox" disabled checked>
        <span>Include LinkedIn daily</span>
      </label>
      <!-- Compatibility shim for an already-cached app.js from before the
           canonical Sheets flow. Kept unchecked so old clients still upload. -->
      <input id="skipUploadInput" type="checkbox" hidden aria-hidden="true">
      <div class="settings-actions">
        <button id="saveSettingsBtn" class="secondary-action">Save</button>
        <button id="syncBtn" class="secondary-action">Sync Sheets</button>
        <button id="runBtn" class="primary-action">Run Daily Update</button>
      </div>

      <section id="runProgress" class="run-progress" aria-live="polite" hidden>
        <div class="run-progress-copy">
          <span id="runStep">Ready</span>
          <strong id="runPercent">0%</strong>
        </div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <span id="progressFill"></span>
        </div>
      </section>

      <pre id="runLog" class="run-log" aria-live="polite"></pre>
    </aside>

    <script src="/app.js?v=20260710-sync-flow-2"></script>
  </body>
</html>
