name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://daily_jobs:daily_jobs@localhost:5432/daily_berlin_jobs
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: daily_berlin_jobs
          POSTGRES_USER: daily_jobs
          POSTGRES_PASSWORD: daily_jobs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daily_jobs -d daily_berlin_jobs"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements.txt
      - run: python scripts/db.py migrate
      - run: python scripts/db.py doctor
      - run: python scripts/smoke_postgres.py
      - run: python scripts/catalog.py audit catalog/companies.yaml
      - run: python -m unittest discover -s tests -v

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      USE_SAMPLE_DATA: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - run: node --check ../daily_berlin_jobs/static/app.js
