name: Daily Berlin Jobs Update

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

concurrency:
  group: daily-berlin-jobs-update
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    name: Crawl, publish, and verify
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SHEET_ID: "1sYI0IqzXp_W19eAYDCdC46ZjzrWqW5fwHfY0sAzUxKw"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Validate configuration
        run: |
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON"
          test -n "$GOOGLE_SHEET_ID"
          python -c 'import json, os; data=json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"]); assert data["type"] == "service_account"'

      - name: Restore canonical Sheets snapshot
        run: |
          python job_scraper/src/pull_from_sheets.py \
            --spreadsheet "https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/"

      - name: Collect ATS jobs
        run: |
          python job_scraper/src/main.py \
            "https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/" \
            -t sheets \
            --input-worksheet OneSingle

      - name: Publish canonical datasets
        run: |
          python job_scraper/src/post_process_jobs.py \
            --spreadsheet "https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/" \
            --include-linkedin-daily \
            --linkedin-raw-daily \
            --no-update-baseline

      - name: Verify published Sheets snapshot
        run: |
          python job_scraper/src/pull_from_sheets.py \
            --spreadsheet "https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/"
          python - <<'PY'
          import pandas as pd

          all_jobs = pd.read_csv("data/published_all_jobs.csv", low_memory=False)
          daily_jobs = pd.read_csv("data/daily_new_jobs.csv", low_memory=False)
          required_columns = {
              "Role", "Level", "Work Mode", "Tech Stack", "Keywords", "Classification Version"
          }
          assert len(all_jobs) > 0, "All Jobs is empty after publish"
          assert required_columns.issubset(all_jobs.columns), "All Jobs is missing classification columns"
          assert required_columns.issubset(daily_jobs.columns), "New Today is missing classification columns"
          assert all_jobs["Role"].fillna("").str.strip().ne("").all(), "All Jobs contains an unclassified role"
          assert all_jobs["Classification Version"].eq("engineering-v2").all(), "Unexpected classification version"
          print(f"Verified All Jobs: {len(all_jobs)}")
          print(f"Verified New Today: {len(daily_jobs)}")
          PY
