name: Daily Berlin Jobs Update

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

concurrency:
  group: daily-berlin-jobs-update
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    name: Crawl, publish, and verify
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      STORAGE_BACKEND: postgres
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Install application package
        run: python -m pip install --disable-pip-version-check --no-deps -e .

      - name: Validate configuration
        run: |
          test -n "$DATABASE_URL"
          python -c 'import os; assert os.environ["DATABASE_URL"].startswith(("postgres://", "postgresql://"))'

      - name: Apply database migrations
        run: python scripts/db.py migrate

      - name: Collect ATS jobs
        run: |
          python -m daily_jobs.main \
            -t postgres

      - name: Publish canonical datasets
        run: |
          python -m daily_jobs.post_process_jobs \
            --storage-backend postgres \
            --retention-days 30 \
            --include-linkedin-daily \
            --linkedin-raw-daily \
            --no-update-baseline

      - name: Verify PostgreSQL snapshot
        run: |
          python - <<'PY'
          from daily_jobs.postgres_storage import PostgresJobStorage

          with PostgresJobStorage().connect() as connection, connection.cursor() as cursor:
              cursor.execute("SELECT count(*) FROM public_jobs")
              all_count = cursor.fetchone()[0]
              cursor.execute("SELECT count(*) FROM daily_jobs")
              daily_count = cursor.fetchone()[0]
              cursor.execute("SELECT count(*) FROM public_jobs WHERE role = '' OR classification_version <> 'engineering-v2'")
              invalid_count = cursor.fetchone()[0]
          assert all_count > 0, "public_jobs is empty after publish"
          assert invalid_count == 0, "public_jobs contains invalid classification"
          print(f"Verified public_jobs: {all_count}")
          print(f"Verified daily_jobs: {daily_count}")
          PY
